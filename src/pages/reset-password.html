<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
</head>
<body>
    <h1>Reset Password</h1>

    <form id="requestResetForm">
        <label>
            Email
            <input id="resetEmail" name="email" type="text" autocomplete="email" required>
        </label>

        <button type="submit">Send reset email</button>
    </form>

    <form id="setPasswordForm" hidden>
        <label>
            New password
            <input id="newPassword" name="newPassword" type="password" autocomplete="new-password" required>
        </label>

        <label>
            Confirm new password
            <input id="confirmNewPassword" name="confirmNewPassword" type="password" autocomplete="new-password" required>
        </label>

        <button type="submit">Change password</button>
    </form>

    <p id="message"></p>
    <p><a href="login.html">Back to login</a></p>

    <script src="js/forgot-password.js"></script>
</body>
</html>
